<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="theme-color" content="#FF1F5A" />
        <meta name="description" content="Indústria Visual - Sistema de Gestão e Produtividade" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Indústria Visual" />
        <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
        <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
        <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
        <title>Indústria Visual</title>
    <style>
      /* Aparece ANTES do React montar — elimina flash branco */
      html, body { background: #16122a; margin: 0; }
      #root {
        min-height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        background: #16122a;
      }
      /* Placeholder de sidebar enquanto o JS carrega */
      #root:empty::before {
        content: '';
        display: block;
        width: 240px;
        min-height: 100vh;
        background: #1e1a30;
        flex-shrink: 0;
      }
    </style>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script>
        (function(){
          try{
            var T='v8';
            if(localStorage.getItem('iv_clear')===T)return;
            localStorage.setItem('iv_clear',T);
            var jobs=[];
            if('caches'in window)jobs.push(caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return caches.delete(k);}));}));
            if('serviceWorker'in navigator)jobs.push(navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){return r.unregister();}));}));
            // PRESERVA a querystring existente (ex.: /reset-password?token=X) — só adiciona _v.
            var go=function(){try{var u=new URL(location.href);u.searchParams.set('_v',T);window.location.replace(u.toString());}catch(e){window.location.replace(location.pathname+'?_v='+T);}};
            Promise.all(jobs).then(go).catch(go);
          }catch(e){/* localStorage indisponível (ex.: Safari privado): segue sem sentinel para não entrar em loop de reload */}
        })();
        </script>
        <script>
            // Register Service Worker for PWA
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/service-worker.js')
                        .then(registration => {
                            console.log('SW registered:', registration);
                        })
                        .catch(error => {
                            console.log('SW registration failed:', error);
                        });
                });
            }
        </script>
    </body>
</html>
